{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="page-title">Add Content</h1>

        {% if message %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <div class="card-custom">
            <form method="POST" action="/add">
                <div class="mb-3">
                    <label for="title" class="form-label fw-semibold">Title</label>
                    <input type="text" class="form-control form-control-custom" id="title" name="title" required>
                </div>

                <div class="mb-3">
                    <label for="platform" class="form-label fw-semibold">Platform</label>
                    <select class="form-select form-control-custom" id="platform" name="platform" required>
                        <option value="">Select platform</option>
                        <option value="Instagram">Instagram</option>
                        <option value="Twitter">Twitter</option>
                        <option value="LinkedIn">LinkedIn</option>
                        <option value="Facebook">Facebook</option>
                        <option value="YouTube">YouTube</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="type" class="form-label fw-semibold">Type</label>
                    <select class="form-select form-control-custom" id="type" name="type" required>
                        <option value="">Select type</option>
                        <option value="Post">Post</option>
                        <option value="Reel">Reel</option>
                        <option value="Story">Story</option>
                        <option value="Video">Video</option>
                        <option value="Article">Article</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="date" class="form-label fw-semibold">Date</label>
                    <input type="date" class="form-control form-control-custom" id="date" name="date" required>
                </div>

                <div class="mb-3">
                    <label for="status" class="form-label fw-semibold">Status</label>
                    <select class="form-select form-control-custom" id="status" name="status" required>
                        <option value="Draft" selected>Draft</option>
                        <option value="Approval Pending">Approval Pending</option>
                        <option value="Approved">Approved</option>
                        <option value="Planned">Planned</option>
                        <option value="Posted">Posted</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="notes" class="form-label fw-semibold">Notes (Optional)</label>
                    <textarea class="form-control form-control-custom" id="notes" name="notes" rows="4" placeholder="Add captions, hashtags, links, or reminders..."></textarea>
                </div>

                <div class="mb-3">
                    <label for="reference_link" class="form-label fw-semibold">Reference Link (Optional)</label>
                    <input type="url" class="form-control form-control-custom" id="reference_link" name="reference_link" placeholder="https://example.com/reference">
                    <small class="text-secondary">Use this for inspiration, briefs, or source material while planning.</small>
                </div>

                <div class="mb-3">
                    <label for="posted_link" class="form-label fw-semibold">Posted Link (Optional)</label>
                    <input type="url" class="form-control form-control-custom" id="posted_link" name="posted_link" placeholder="https://example.com/live-post">
                    <small class="text-secondary">If already published, paste the final public post URL.</small>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 mt-2">Add Content</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
