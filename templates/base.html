<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMCP — Social Media Content Planner</title>
    <script>
        (function () {
            const storedTheme = localStorage.getItem("smcp-theme") || "dark";
            if (!localStorage.getItem("smcp-theme")) {
                localStorage.setItem("smcp-theme", storedTheme);
            }
            document.documentElement.setAttribute("data-theme", storedTheme);
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/" title="Social Media Content Planner">
                <span class="brand-logo">SMCP</span>
                <span class="brand-tagline d-none d-md-inline">Plan. Create. Post.</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse navbar-collapse-custom" id="navbarNav">
                <ul class="navbar-nav ms-auto nav-links-custom">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/add' %}active{% endif %}" href="/add">Add Content</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/content' %}active{% endif %}" href="/content">Content List</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/calendar' %}active{% endif %}" href="/calendar">Calendar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/analytics' %}active{% endif %}" href="/analytics">Analytics</a>
                    </li>
                    <li class="nav-item d-flex align-items-center ms-lg-2 nav-theme-item">
                        <button id="themeToggle" type="button" class="btn btn-secondary-custom theme-toggle">Dark Mode</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="container" style="padding-top: 84px; padding-bottom: 60px;">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="container text-center">
            SMCP v1.0 — Built for creators who plan ahead.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            const storedTheme = localStorage.getItem("smcp-theme") || "dark";
            if (!localStorage.getItem("smcp-theme")) {
                localStorage.setItem("smcp-theme", storedTheme);
            }
            document.body.setAttribute("data-theme", storedTheme);
            document.documentElement.setAttribute("data-theme", storedTheme);

            const toggleBtn = document.getElementById("themeToggle");
            if (!toggleBtn) {
                return;
            }

            const setButtonText = (theme) => {
                toggleBtn.textContent = theme === "dark" ? "Light Mode" : "Dark Mode";
            };

            setButtonText(storedTheme);

            toggleBtn.addEventListener("click", function () {
                const current = document.body.getAttribute("data-theme") || "light";
                const next = current === "dark" ? "light" : "dark";
                document.body.setAttribute("data-theme", next);
                document.documentElement.setAttribute("data-theme", next);
                localStorage.setItem("smcp-theme", next);
                setButtonText(next);
            });
        })();
    </script>
</body>
</html>
