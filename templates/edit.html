{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="page-title">Edit Content</h1>

        <div class="card-custom">
            <form method="POST" action="/edit/{{ item.ID | int }}">
                <div class="mb-3">
                    <label for="title" class="form-label fw-semibold">Title</label>
                    <input type="text" class="form-control form-control-custom" id="title" name="title" value="{{ item.Title }}" required>
                </div>

                <div class="mb-3">
                    <label for="platform" class="form-label fw-semibold">Platform</label>
                    <select class="form-select form-control-custom" id="platform" name="platform" required>
                        {% for p in ['Instagram', 'Twitter', 'LinkedIn', 'Facebook', 'YouTube'] %}
                        <option value="{{ p }}" {% if item.Platform == p %}selected{% endif %}>{{ p }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="type" class="form-label fw-semibold">Type</label>
                    <select class="form-select form-control-custom" id="type" name="type" required>
                        {% for t in ['Post', 'Reel', 'Story', 'Video', 'Article'] %}
                        <option value="{{ t }}" {% if item.Type == t %}selected{% endif %}>{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="date" class="form-label fw-semibold">Date</label>
                    <input type="date" class="form-control form-control-custom" id="date" name="date" value="{{ item.Date }}" required>
                </div>

                <div class="mb-3">
                    <label for="status" class="form-label fw-semibold">Status</label>
                    <select class="form-select form-control-custom" id="status" name="status" required>
                        {% for s in ['Draft', 'Approval Pending', 'Approved', 'Planned', 'Posted'] %}
                        <option value="{{ s }}" {% if item.Status == s %}selected{% endif %}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="notes" class="form-label fw-semibold">Notes (Optional)</label>
                    <textarea class="form-control form-control-custom" id="notes" name="notes" rows="4" placeholder="Add captions, hashtags, links, or reminders...">{{ item.Notes }}</textarea>
                </div>

                <div class="mb-3">
                    <label for="reference_link" class="form-label fw-semibold">Reference Link (Optional)</label>
                    <input type="url" class="form-control form-control-custom" id="reference_link" name="reference_link" value="{{ item.ReferenceLink }}" placeholder="https://example.com/reference">
                </div>

                <div class="mb-3">
                    <label for="posted_link" class="form-label fw-semibold">Posted Link (Optional)</label>
                    <input type="url" class="form-control form-control-custom" id="posted_link" name="posted_link" value="{{ item.PostedLink }}" placeholder="https://example.com/live-post">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary-custom flex-grow-1">Save Changes</button>
                    <a href="/content" class="btn btn-secondary-custom">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
